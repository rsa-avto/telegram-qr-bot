<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Смена PIN — {{ operator['name'] }}</title>
<style>
body { font-family: Arial; padding:20px; text-align:center; }
input { padding:10px; margin:5px 0; width:150px; font-size:16px; }
button { padding:10px 20px; font-size:16px; border:none; border-radius:5px; background:#4CAF50; color:white; cursor:pointer; }
.message { margin:10px 0; font-weight:bold; color:red; }
</style>
</head>
<body>

<h1>Смена PIN — {{ operator['name'] }}</h1>

{% if message %}
    <p class="message">{{ message }}</p>
{% endif %}

<form method="post">
    <p>Текущий PIN:</p>
    <input type="password" name="old_pin" maxlength="4" placeholder="****" required autofocus>
    <p>Новый PIN (4 цифры):</p>
    <input type="password" name="new_pin" maxlength="4" placeholder="****" required>
    <br>
    <button type="submit">Сменить PIN</button>
</form>

<p><a href="/operator">← Вернуться к панели</a></p>

</body>
</html>
