<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Заказ отправлен</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Карточка */
.card {
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 350px;
    width: 100%;
    animation: fadeIn 0.6s ease;
}

/* Заголовок */
h1 {
    color: #2e7d32;
    margin-bottom: 15px;
}

/* Текст */
p {
    color: #555;
    font-size: 16px;
    margin-bottom: 25px;
}

/* Лоадер */
.loader {
    margin: 20px auto;
    width: 70px;
    height: 70px;
    border: 8px solid #eee;
    border-top: 8px solid #43a047;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* Пульсирующие точки */
.dots span {
    animation: blink 1.4s infinite;
    font-size: 20px;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
    <h1>⛽ Оплатите заказ</h1>

    <p>
        Ожидаем подтверждение от оператора
        <span class="dots">
            <span>.</span><span>.</span><span>.</span>
        </span>
    </p>

    <div class="loader"></div>

    <p style="font-size:14px; color:#999;">
        Не закрывайте страницу
    </p>
</div>

<script>
const telegramId = "{{ session['telegram_id'] }}";

const evtSource = new EventSource(`/notifications/stream?telegram_id=${telegramId}`);

evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);
    console.log("Получено уведомление:", data);

    if (data.type === "order_done" && data.order_id == {{ order_id }}) {
        evtSource.close();

        window.location.href =
            `/order_success_analog/${data.order_id}?fuel=${data.fuel}&litres=${data.litres}&rub=${data.amount_rub}&points=${data.points}&payment=${data.payment_method}`;
    }
};
</script>

</body>
</html>
