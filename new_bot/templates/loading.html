<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Заправка идет...</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}
#tank-container {
    width: 120px;
    height: 250px;
    border: 2px solid #333;
    border-radius: 12px;
    background: #eee;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
}
#tank-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0;
    background: linear-gradient(to top, #4CAF50, #81C784);
    border-radius: 8px 8px 0 0;
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.3);
}
p {
    font-size: 20px;
    text-align: center;
    margin-top: 20px;
}
</style>
</head>
<body>

<div id="tank-container">
    <div id="tank-fill"></div>
</div>
<p>⛽ Заправка идет...</p>

<script>
// Анимация заполнения бака
let progress = 0;
let tankFill = document.getElementById('tank-fill');
function animateTank() {
    progress += 0.5;
    if (progress > 100) progress = 0;
    tankFill.style.height = progress + '%';
    requestAnimationFrame(animateTank);
}
animateTank();

// SSE для уведомления пользователя
const orderId = {{ order_id }};
const telegramId = "{{ session['telegram_id'] }}";

const evtSource = new EventSource(`/notifications/stream?telegram_id=${telegramId}`);
evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);
    console.log("🔥 Получено:", data);

    // Для полного бака
    if (data.type === "full_tank_ready" && data.order_id == orderId) {
        window.location.href = `/confirmed_analog/${orderId}`;
    }

    // Для обычного заказа, когда оператор подтвердил оплату
    if (data.type === "order_done" && data.order_id == orderId) {
        window.location.href = `/order_success_analog/${orderId}`;
    }
};

</script>

</body>
</html>
