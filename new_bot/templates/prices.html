<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цены на топливо</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f7f7f7; text-align:center; }
table { margin:auto; border-collapse: collapse; width:80%; max-width:400px; }
th, td { border: 1px solid #ccc; padding:10px; }
th { background:#10B981; color:white; }
td { background:white; }
h1 { margin-bottom:20px; }
</style>
</head>
<body>

<h1>Цены на топливо</h1>
<table>
<tr>
    <th>Топливо</th>
    <th>Цена за литр (₽)</th>
</tr>
{% for f in fuels %}
<tr>
    <td>{{ f['fuel_type'] }}</td>
    <td>{{ "%.2f"|format(f['price_per_litre']) }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
