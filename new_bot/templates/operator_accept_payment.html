<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Принял (деньги)</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: #fff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 400px;
    width: 100%;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

p {
    font-size: 18px;
    margin-bottom: 30px;
    color: #555;
}

button {
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.3s ease;
    width: 100%;
}

button:hover {
    background-color: #45a049;
}

</style>
</head>
<body>

<div class="card">
    <h1>Заказ №{{ order["№"] }}</h1>
    <p>Пользователь оплатил: {{ order["Оплата"] or "не выбран" }}</p>

    <form method="post" action="/operator/accept_payment/{{ order['№'] }}">
    <button type="submit">✅ Принял оплату</button>
</form>
</div>

</body>
</html>
