<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заправка выполнена</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align:center; background:#f7f7f7; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); display:inline-block; margin-top:50px; }
        h1 { color:#4CAF50; }
        p { font-size:16px; }
        a { display:block; margin-top:20px; color:#4CAF50; text-decoration:none; }
        a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="card">
    <h1>✅ Заправка прошла успешно!</h1>
    <p>Топливо: {{ fuel }}</p>
    <p>Литров: {{ litres }}</p>
    <p>Сумма: {{ "%.2f"|format(rub) }} ₽</p>

    {% if bonus_message %}
    <p>Заправка по баллам прошла успешно!</p>
{% elif points %}
    <p>Вам начислено: <strong>{{ points }}</strong> баллов</p>
{% endif %}

    <a href="/dashboard">Вернуться на главную</a>
</div>
</body>
</html>
