<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ввод литров</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f7f7f7;
    padding:20px;
}

.card {
    max-width:400px;
    margin:0 auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1 {
    text-align:center;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
    border-radius:5px;
}

input {
    border:1px solid #ccc;
}

button {
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover {
    background:#45a049;
}
</style>
</head>

<body>

<div class="card">
    <h1>⛽ Введите литры</h1>

    <p><strong>Станция:</strong> {{ station_name }}</p>
    <p><strong>Топливо:</strong> {{ order["Топливо"] }}</p>

    <form method="post">
        <input type="number" name="litres" step="any" placeholder="Сколько вошло литров" required>
        <button type="submit">Подтвердить</button>
    </form>
</div>

</body>
</html>
