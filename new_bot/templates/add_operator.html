<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Добавить оператора</title>
<style>
body { font-family: Arial, sans-serif; padding:10px; background:#f7f7f7; }
h1 { text-align:center; }
form { max-width:400px; margin:0 auto; background:white; padding:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0 15px 0; font-size:16px; border-radius:5px; border:1px solid #ccc; }
button { background:#4CAF50; color:white; border:none; }
button:hover { background:#45a049; }
a { text-decoration:none; color:#4CAF50; }
a:hover { text-decoration:underline; }
@media(max-width:500px) { input, select, button { font-size:14px; padding:8px; } }
</style>
</head>
<body>
<h1>Добавить нового оператора</h1>
<form method="post">
    <label>Имя оператора:</label>
    <input type="text" name="name" required>

    <label>Телефон:</label>
    <input type="text" name="phone" required placeholder="+7XXXXXXXXXX">

    <label>Станция:</label>
    <select name="station" required>
        {% for code, name in stations.items() %}
        <option value="{{ code }}">{{ name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Добавить</button>
</form>
<p style="text-align:center"><a href="/dashboard">← Назад</a></p>
</body>
</html>
